name: Generate Static GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *" # Bot tự động chạy cập nhật 12 tiếng/lần
  workflow_dispatch: # Nút cho phép bạn bấm chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Khởi tạo thư mục chứa ảnh tĩnh
        run: mkdir -p github-metrics

      - name: Fetch Trophies SVG
        run: curl -o github-metrics/trophies.svg "https://github-profile-trophy.vercel.app/?username=mindu2kk&theme=radical&no-frame=true&margin-w=15"

      - name: Fetch Stats SVG
        run: curl -o github-metrics/stats.svg "https://github-readme-stats.vercel.app/api?username=mindu2kk&show_icons=true&theme=radical&hide_border=true&bg_color=0D1117"

      - name: Fetch Top Langs SVG
        run: curl -o github-metrics/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=mindu2kk&layout=compact&theme=radical&hide_border=true&bg_color=0D1117"

      - name: Fetch Activity Graph SVG
        run: curl -o github-metrics/activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=mindu2kk&theme=radical&hide_border=true&bg_color=0D1117"

      - name: Commit và Đẩy file ảnh lên Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics/*
          git commit -m "🚀 Auto-update GitHub stats SVGs" || echo "No changes to commit"
          git push
